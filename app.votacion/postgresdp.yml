apiVersion: apps/v1
kind: Deployment 
metadata:
  name: db
  labels: 
    app: app-votacion
spec:
  replicas: 1
  selector:
    matchLabels:
      name: db
      app: app-votacion
  templates:
    metadata:
      name: db
      labels:
        name: db
        app: app-votacion
    spec:
      containers:
      - name: postgres
        image: postgres:9.4
        env:
        - name: POSTGRES_USER
          value: posgtres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_HOST_AUT_METHOD    
          value: trust
        ports:
        - containerPort: 5432
          name: postgres